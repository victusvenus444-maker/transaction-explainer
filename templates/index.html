<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Transaction Explainer – 2030</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: #0b0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .container {
            width: 100%;
            max-width: 920px;
            background: rgba(11, 14, 30, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 32px;
            padding: 40px 50px;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.08), inset 0 0 60px rgba(0, 255, 255, 0.03);
            transition: box-shadow 0.4s;
        }

        .container:hover {
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.15), inset 0 0 80px rgba(0, 255, 255, 0.05);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .title h1 {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00f0ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        .title .icon {
            font-size: 36px;
            filter: drop-shadow(0 0 12px #00f0ff);
        }

        .status-led {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.08);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            letter-spacing: 1px;
        }

        .status-led .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00f0ff;
            box-shadow: 0 0 20px #00f0ff;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-top: 4px;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
            border-left: 2px solid #a855f7;
            padding-left: 16px;
            font-weight: 300;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 10px;
        }

        .input-wrapper {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .input-wrapper label {
            position: absolute;
            top: -10px;
            left: 18px;
            background: #0b0e1a;
            padding: 0 8px;
            font-size: 13px;
            font-weight: 600;
            color: #a855f7;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            color: #e2e8f0;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
            outline: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        .input-wrapper input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15), inset 0 0 30px rgba(0, 240, 255, 0.05);
            background: rgba(0, 240, 255, 0.02);
        }

        .input-wrapper input::placeholder {
            color: #475569;
            font-family: 'Segoe UI', monospace;
        }

        .btn-submit {
            padding: 16px 40px;
            background: linear-gradient(135deg, #00f0ff, #a855f7);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            color: #0b0e1a;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            white-space: nowrap;
        }

        .btn-submit:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        #result {
            margin-top: 30px;
            padding: 24px 28px;
            background: rgba(0, 240, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(0, 240, 255, 0.1);
            min-height: 100px;
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.8;
            display: none;
            transition: 0.4s;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        #result.show {
            display: block;
        }

        #result.loading {
            border-color: #a855f7;
            box-shadow: inset 0 0 60px rgba(168, 85, 247, 0.05);
        }

        #result.error {
            border-color: #ff4d6d;
            box-shadow: inset 0 0 60px rgba(255, 77, 109, 0.05);
        }

        #result::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, #a855f7, transparent);
            opacity: 0.4;
        }

        .tx-hash {
            font-family: 'Courier New', monospace;
            background: rgba(0, 240, 255, 0.08);
            padding: 6px 18px;
            border-radius: 40px;
            display: inline-block;
            font-size: 14px;
            color: #00f0ff;
            border: 1px solid rgba(0, 240, 255, 0.15);
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            word-break: break-all;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin: 18px 0 14px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }

        .stat-value.risk-low { color: #00ff96; }
        .stat-value.risk-medium { color: #fbbf24; }
        .stat-value.risk-high { color: #ff4d6d; }

        .risk-reasons {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success {
            background: rgba(0, 255, 150, 0.12);
            color: #00ff96;
            border: 1px solid rgba(0, 255, 150, 0.3);
        }

        .badge-failed {
            background: rgba(255, 77, 109, 0.12);
            color: #ff4d6d;
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        .badge-risk-low {
            background: rgba(0, 255, 150, 0.12);
            color: #00ff96;
            border: 1px solid rgba(0, 255, 150, 0.3);
        }

        .badge-risk-medium {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .badge-risk-high {
            background: rgba(255, 77, 109, 0.12);
            color: #ff4d6d;
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        .explanation-text {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .footer {
            margin-top: 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 13px;
            color: #475569;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 24px;
            letter-spacing: 0.3px;
        }

        .footer .powered {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .footer .powered span {
            color: #64748b;
        }

        .footer .powered .glow-text {
            color: #00f0ff;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .footer .version {
            background: rgba(255,255,255,0.03);
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            color: #64748b;
        }

        @media (max-width: 700px) {
            .container { padding: 28px 20px; }
            .title h1 { font-size: 24px; }
            .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .input-group { flex-direction: column; }
            .btn-submit { width: 100%; justify-content: center; }
            .footer { flex-direction: column; gap: 12px; align-items: flex-start; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        ::-webkit-scrollbar {
            width: 6px;
            background: #0b0e1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
            box-shadow: 0 0 20px #a855f7;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="title">
            <span class="icon">⚡</span>
            <h1>Tx·Explain</h1>
        </div>
        <div class="status-led">
            <span class="dot"></span>
            <span>AI ONLINE</span>
        </div>
    </div>
    <div class="subtitle">
        <span style="color:#a855f7;">⟡</span> paste a hash &nbsp;·&nbsp; decode the chain
    </div>

    <!-- Form -->
    <form id="txForm">
        <div class="input-group">
            <div class="input-wrapper">
                <label for="txHash">Transaction Hash</label>
                <input
                    type="text"
                    id="txHash"
                    placeholder="0x…"
                    required
                    autofocus
                />
            </div>
            <button type="submit" class="btn-submit" id="explainBtn">⟡ EXPLAIN</button>
        </div>
    </form>

    <!-- Result -->
    <div id="result"></div>

    <!-- Footer -->
    <div class="footer">
        <div class="powered">
            <span>⚡ Etherscan</span>
            <span>◈</span>
            <span class="glow-text">AI · Risk Score</span>
        </div>
        <div class="version">v2030.1</div>
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('txForm');
        const input = document.getElementById('txHash');
        const resultDiv = document.getElementById('result');
        const explainBtn = document.getElementById('explainBtn');

        function showResult(content, type = 'info') {
            resultDiv.className = 'show';
            resultDiv.innerHTML = content;
            if (type === 'loading') {
                resultDiv.classList.add('loading');
                resultDiv.classList.remove('error');
            } else if (type === 'error') {
                resultDiv.classList.add('error');
                resultDiv.classList.remove('loading');
            } else {
                resultDiv.classList.remove('loading', 'error');
            }
        }

        function formatResult(data) {
            const { hash, explanation, risk_score, risk_level, risk_reasons,
                    gas_fee_eth, gas_fee_usd, age, from_addr, to_addr,
                    value_eth, status, logs_count } = data;

            // Status badge
            const statusBadge = status.toLowerCase() === 'success' ?
                `<span class="badge badge-success">✔ Success</span>` :
                `<span class="badge badge-failed">✖ Failed</span>`;

            // Risk badge
            const riskClass = `badge-risk-${risk_level.toLowerCase()}`;
            const riskBadge = `<span class="badge ${riskClass}">${risk_level} Risk (${risk_score})</span>`;

            // Reasons (if any)
            let reasonsHtml = '';
            if (risk_reasons && risk_reasons.length) {
                reasonsHtml = `<div class="risk-reasons">🔍 ${risk_reasons.join(' • ')}</div>`;
            }

            // Gas fee display
            let gasFeeDisplay = `${gas_fee_eth} ETH`;
            if (gas_fee_usd) {
                gasFeeDisplay += ` ($${gas_fee_usd})`;
            }

            // Addresses (shortened)
            const shortFrom = from_addr ? `${from_addr.slice(0, 6)}...${from_addr.slice(-4)}` : 'N/A';
            const shortTo = to_addr ? `${to_addr.slice(0, 6)}...${to_addr.slice(-4)}` : 'N/A';

            // Build stats grid
            const statsHtml = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Value</div>
                        <div class="stat-value">${value_eth} ETH</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Gas Fee</div>
                        <div class="stat-value">${gasFeeDisplay}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Age</div>
                        <div class="stat-value">${age}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Logs</div>
                        <div class="stat-value">${logs_count}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">From</div>
                        <div class="stat-value" style="font-size:14px;">${shortFrom}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">To</div>
                        <div class="stat-value" style="font-size:14px;">${shortTo}</div>
                    </div>
                </div>
                <div style="margin: 10px 0;">
                    ${statusBadge} ${riskBadge}
                </div>
                ${reasonsHtml}
            `;

            // AI explanation
            const explanationHtml = `
                <div class="explanation-text">
                    <strong>🤖 AI Summary</strong><br>
                    ${explanation.replace(/\n/g, '<br>')}
                </div>
            `;

            return `
                <div class="tx-hash">📋 ${hash}</div>
                ${statsHtml}
                ${explanationHtml}
            `;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const txHash = input.value.trim();
            if (!txHash) {
                showResult('⚠️ Please enter a transaction hash.', 'error');
                return;
            }
            if (!/^0x[a-fA-F0-9]{64}$/.test(txHash)) {
                showResult('⚠️ Invalid hash format. Must start with 0x + 64 hex chars.', 'error');
                return;
            }

            showResult('⏳ scanning the chain …', 'loading');
            explainBtn.disabled = true;
            input.disabled = true;

            try {
                const resp = await fetch('/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ tx_hash: txHash })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Server error');
                if (data.error) throw new Error(data.error);

                // data now includes risk_score, risk_level, etc.
                const html = formatResult(data);
                showResult(html, 'info');
            } catch (err) {
                showResult(`❌ ${err.message}`, 'error');
            } finally {
                explainBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        });

        input.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        input.focus();
    })();
</script>
</body>
</html>
